<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - TG-Lion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0066ff;
            --bg: #05070a;
            --card-bg: rgba(15, 20, 25, 0.8);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0, 102, 255, 0.1) 0%, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        h2 {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .subtitle {
            margin-bottom: 2rem;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 1px;
        }
        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
            transform: translateY(-1px);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 102, 255, 0.4);
            filter: brightness(1.1);
        }
        button:active {
            transform: translateY(0);
        }
        .error-msg {
            color: #ff4444;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            background: rgba(255, 68, 68, 0.1);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 68, 68, 0.2);
            font-weight: 600;
        }
        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }
        .footer-text b {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-card animate__animated animate__zoomIn">
        <h2>BGT WALLET</h2>
        <p class="subtitle">Access your account history</p>
        <form action="/login" method="post">
            {% if error %}
            <div class="error-msg animate__animated animate__shakeX">
                {{ error }}
            </div>
            {% endif %}
            <div class="input-group">
                <input type="text" name="user_id" placeholder="ENTER HISTORY ID" required autocomplete="off">
            </div>
            <button type="submit">Login Securely</button>
        </form>
        <div class="footer-text">
            Get your ID from the bot's <b>"My History"</b> section
        </div>
    </div>
</body>
</html>
